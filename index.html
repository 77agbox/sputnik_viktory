<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Кружки</title>

  <style>
    body { font-family: Arial; padding: 20px; background:#f5f5f5; }

    .filters { display:grid; gap:10px; margin-bottom:15px; }

    input, select, button {
      padding: 10px;
      width: 100%;
      font-size: 16px;
      border-radius:8px;
      border:1px solid #ccc;
    }

    .item {
      padding: 15px;
      background:white;
      border-radius:12px;
      margin-bottom:10px;
      box-shadow:0 2px 6px rgba(0,0,0,0.05);
      position:relative;
    }

    .title { font-weight:bold; }

    .fav {
      position:absolute;
      top:10px;
      right:10px;
      cursor:pointer;
      font-size:20px;
    }

    .active { color: gold; }

    .count { font-weight:bold; margin:10px 0; }
  </style>
</head>
<body>

<h1>Кружки</h1>

<div class="filters">
  <input type="text" id="search" placeholder="Поиск..." />

  <select id="categoryFilter">
    <option value="">Все категории</option>
  </select>

  <select id="ageFilter">
    <option value="">Любой возраст</option>
    <option value="6-10">6–10</option>
    <option value="10-14">10–14</option>
    <option value="14+">14+</option>
  </select>

  <button id="showFav">Показать избранное</button>
</div>

<div class="count" id="count"></div>
<div id="list"></div>

<script>
let data = [];
let favorites = JSON.parse(localStorage.getItem('favorites') || '[]');
let showOnlyFav = false;

const list = document.getElementById('list');
const search = document.getElementById('search');
const categoryFilter = document.getElementById('categoryFilter');
const ageFilter = document.getElementById('ageFilter');
const showFavBtn = document.getElementById('showFav');
const count = document.getElementById('count');

function toggleFavorite(id) {
  if (favorites.includes(id)) {
    favorites = favorites.filter(f => f !== id);
  } else {
    favorites.push(id);
  }
  localStorage.setItem('favorites', JSON.stringify(favorites));
  applyFilters();
}

function matchAge(itemAge, filter) {
  if (!filter) return true;
  if (!itemAge) return false;

  if (filter === '14+') return itemAge.includes('14') || itemAge.includes('15') || itemAge.includes('16') || itemAge.includes('17') || itemAge.includes('18');

  const [min, max] = filter.split('-').map(Number);
  const nums = itemAge.match(/\d+/g);
  if (!nums) return false;

  const itemMin = Number(nums[0]);
  return itemMin >= min && itemMin <= max;
}

function render(items) {
  list.innerHTML = '';
  count.textContent = `Найдено: ${items.length}`;

  items.forEach(item => {
    const id = item['Ссылка'];
    const isFav = favorites.includes(id);

    const div = document.createElement('div');
    div.className = 'item';

    div.innerHTML = `
      <div class="fav ${isFav ? 'active' : ''}" onclick="toggleFavorite('${id}')">★</div>
      <div class="title">${item['Наименование детского объединения']}</div>
      <div>${item['Наименование третьего уровня РБНДО']}</div>
      <div>${item['Возраст']}</div>
      <div>${item['Адрес предоставления услуги']}</div>
      <a href="${item['Ссылка']}" target="_blank">Подробнее</a>
    `;

    list.appendChild(div);
  });
}

function applyFilters() {
  const text = search.value.toLowerCase();
  const category = categoryFilter.value;
  const age = ageFilter.value;

  const filtered = data.filter(item => {
    const t = Object.values(item).join(' ').toLowerCase();
    const matchesText = t.includes(text);
    const matchesCategory = !category || item['Наименование третьего уровня РБНДО'] === category;
    const matchesAge = matchAge(item['Возраст'], age);
    const matchesFav = !showOnlyFav || favorites.includes(item['Ссылка']);

    return matchesText && matchesCategory && matchesAge && matchesFav;
  });

  render(filtered);
}

function initCategories() {
  const cats = [...new Set(data.map(i => i['Наименование третьего уровня РБНДО']))];
  cats.sort();

  cats.forEach(cat => {
    const o = document.createElement('option');
    o.value = cat;
    o.textContent = cat;
    categoryFilter.appendChild(o);
  });
}

showFavBtn.addEventListener('click', () => {
  showOnlyFav = !showOnlyFav;
  showFavBtn.textContent = showOnlyFav ? 'Показать все' : 'Показать избранное';
  applyFilters();
});

search.addEventListener('input', applyFilters);
categoryFilter.addEventListener('change', applyFilters);
ageFilter.addEventListener('change', applyFilters);

fetch('./data.json')
  .then(r => r.json())
  .then(json => {
    data = json;
    initCategories();
    render(data);
  });
</script>

</body>
</html>
