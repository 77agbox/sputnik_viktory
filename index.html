<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Поиск по кружкам</title>

  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <style>
    body { font-family: Arial; padding: 20px; background:#f5f5f5; }
    input, select, button { padding: 10px; width: 100%; margin-bottom: 10px; font-size: 16px; border-radius:8px; border:1px solid #ccc; }
    .filters { display:grid; gap:10px; margin-bottom:15px; }
    .item { padding: 15px; background:white; border-radius:12px; margin-bottom:10px; box-shadow:0 2px 6px rgba(0,0,0,0.05); }
    #map { height: 300px; margin-bottom:15px; border-radius:12px; }
  </style>
</head>
<body>
  <h1>Поиск по кружкам</h1>

  <div class="filters">
    <input type="text" id="search" placeholder="Поиск..." />
    <select id="categoryFilter"><option value="">Все категории</option></select>
    <button id="showMap">Показать карту</button>
  </div>

  <div id="map" style="display:none"></div>
  <div id="list"></div>

  <script>
    let data = [];
    let map;
    let markers = [];
    let mapVisible = false;

    const list = document.getElementById('list');
    const search = document.getElementById('search');
    const categoryFilter = document.getElementById('categoryFilter');
    const showMapBtn = document.getElementById('showMap');

    function initMap() {
      map = L.map('map').setView([55.75, 37.61], 10);
      L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
    }

    function showMarkers(items) {
      markers.forEach(m => map.removeLayer(m));
      markers = [];

      items.forEach(item => {
        const lat = item.lat;
        const lon = item.lon;

        if (!lat || !lon) return;

        const marker = L.marker([lat, lon]).addTo(map)
          .bindPopup(item['Наименование детского объединения']);

        markers.push(marker);
      });
    }

    function render(items) {
      list.innerHTML = '';

      items.forEach(item => {
        const div = document.createElement('div');
        div.className = 'item';
        div.innerHTML = `
          <b>${item['Наименование детского объединения']}</b><br>
          ${item['Адрес предоставления услуги']}
        `;
        list.appendChild(div);
      });

      if (mapVisible) showMarkers(items);
    }

    function applyFilters() {
      const text = search.value.toLowerCase();
      const category = categoryFilter.value;

      const filtered = data.filter(item => {
        const t = Object.values(item).join(' ').toLowerCase();
        return t.includes(text) && (!category || item['Наименование третьего уровня РБНДО'] === category);
      });

      render(filtered);
    }

    function initCategories() {
      const categories = [...new Set(data.map(i => i['Наименование третьего уровня РБНДО']))];
      categories.forEach(cat => {
        const o = document.createElement('option');
        o.value = cat;
        o.textContent = cat;
        categoryFilter.appendChild(o);
      });
    }

    showMapBtn.addEventListener('click', () => {
      mapVisible = !mapVisible;
      document.getElementById('map').style.display = mapVisible ? 'block' : 'none';
      showMapBtn.textContent = mapVisible ? 'Скрыть карту' : 'Показать карту';

      if (mapVisible && !map) initMap();
      applyFilters();
    });

    search.addEventListener('input', applyFilters);
    categoryFilter.addEventListener('change', applyFilters);

    fetch('./data.json')
      .then(r => r.json())
      .then(json => {
        data = json;
        initCategories();
        render(data);
      });
  </script>
</body>
</html>
