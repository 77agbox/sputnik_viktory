<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Поиск по кружкам</title>
  <style>
    body { font-family: Arial; padding: 20px; }
    input, select { padding: 10px; width: 100%; margin-bottom: 10px; font-size: 16px; }
    .item { padding: 12px; border: 1px solid #ddd; margin-bottom: 10px; border-radius: 8px; }
    .title { font-weight: bold; }
    .link { color: blue; }
    .count { margin: 10px 0; font-weight: bold; }
  </style>
</head>
<body>
  <h1>Поиск по кружкам</h1>

  <input type="text" id="search" placeholder="Поиск..." />
  <select id="categoryFilter">
    <option value="">Все категории</option>
  </select>

  <div class="count" id="count"></div>
  <div id="list"></div>

  <script>
    let data = [];

    const list = document.getElementById('list');
    const search = document.getElementById('search');
    const categoryFilter = document.getElementById('categoryFilter');
    const count = document.getElementById('count');

    function render(items) {
      list.innerHTML = '';
      count.textContent = `Найдено: ${items.length}`;

      items.forEach(item => {
        const div = document.createElement('div');
        div.className = 'item';
        div.innerHTML = `
          <div class="title">${item['Наименование детского объединения']}</div>
          <div>Категория: ${item['Наименование третьего уровня РБНДО']}</div>
          <div>Возраст: ${item['Возраст']}</div>
          <div>Педагог: ${item['Педагог']}</div>
          <div>Адрес: ${item['Адрес предоставления услуги']}</div>
          <a class="link" href="${item['Ссылка']}" target="_blank">Подробнее</a>
        `;
        list.appendChild(div);
      });
    }

    function applyFilters() {
      const text = search.value.toLowerCase();
      const category = categoryFilter.value;

      const filtered = data.filter(item => {
        const matchesText = Object.values(item).join(' ').toLowerCase().includes(text);
        const matchesCategory = !category || item['Наименование третьего уровня РБНДО'] === category;
        return matchesText && matchesCategory;
      });

      render(filtered);
    }

    function setupFilters() {
      search.addEventListener('input', applyFilters);
      categoryFilter.addEventListener('change', applyFilters);
    }

    function initCategories() {
      const categories = [...new Set(data.map(item => item['Наименование третьего уровня РБНДО']))];
      categories.sort();

      categories.forEach(cat => {
        const option = document.createElement('option');
        option.value = cat;
        option.textContent = cat;
        categoryFilter.appendChild(option);
      });
    }

    fetch('./data.json')
      .then(res => res.json())
      .then(json => {
        data = json;
        initCategories();
        setupFilters();
        render(data);
      })
      .catch(err => {
        list.innerHTML = 'Ошибка загрузки данных 😢';
        console.error(err);
      });
  </script>
</body>
</html>
