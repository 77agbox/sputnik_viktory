<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Поиск по кружкам</title>
  <style>
    body { font-family: Arial; padding: 20px; }
    input { padding: 10px; width: 100%; margin-bottom: 20px; font-size: 16px; }
    .item { padding: 12px; border: 1px solid #ddd; margin-bottom: 10px; border-radius: 8px; }
    .title { font-weight: bold; }
    .link { color: blue; }
  </style>
</head>
<body>
  <h1>Поиск по кружкам</h1>

  <input type="text" id="search" placeholder="Поиск по названию, адресу, педагогу..." />

  <div id="list"></div>

  <script>
    let data = [];

    const list = document.getElementById('list');
    const search = document.getElementById('search');

    function render(items) {
      list.innerHTML = '';
      items.forEach(item => {
        const div = document.createElement('div');
        div.className = 'item';
        div.innerHTML = `
          <div class="title">${item['Наименование детского объединения']}</div>
          <div>Категория: ${item['Наименование третьего уровня РБНДО']}</div>
          <div>Возраст: ${item['Возраст']}</div>
          <div>Педагог: ${item['Педагог']}</div>
          <div>Адрес: ${item['Адрес предоставления услуги']}</div>
          <a class="link" href="${item['Ссылка']}" target="_blank">Подробнее</a>
        `;
        list.appendChild(div);
      });
    }

    function setupSearch() {
      search.addEventListener('input', () => {
        const value = search.value.toLowerCase();
        const filtered = data.filter(item =>
          Object.values(item).join(' ').toLowerCase().includes(value)
        );
        render(filtered);
      });
    }

    // Загружаем данные из JSON
    fetch('./data.json')
      .then(res => res.json())
      .then(json => {
        data = json;
        render(data);
        setupSearch();
      })
      .catch(err => {
        list.innerHTML = 'Ошибка загрузки данных 😢';
        console.error(err);
      });
  </script>
</body>
</html>
